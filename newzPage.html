<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple News App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
      text-align: center;
    }

    h1 {
      color: #333;
    }

    input {
      padding: 10px;
      width: 250px;
      margin-right: 10px;
    }

    button {
      padding: 10px 15px;
      cursor: pointer;
    }

    .news-container {
      margin-top: 20px;
      text-align: left;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
    }

    .news-item {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 5px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }

    a {
      text-decoration: none;
      color: #007BFF;
    }
  </style>
</head>
<body>

  <h1>📰 News App</h1>

  <input type="text" id="searchInput" placeholder="Enter topic...">
  <button onclick="searchNews()">Search</button>

  <div class="news-container" id="newsContainer"></div>

  <script>
    const apiURL = "https://hn.algolia.com/api/v1/search?query=";

    // Load default news on page load
    window.onload = function () {
      fetchNews("popular");
    };

    function fetchNews(query) {
      fetch(apiURL + query)
        .then(response => response.json())
        .then(data => displayNews(data.hits))
        .catch(error => console.log(error));
    }

    function displayNews(news) {
      const container = document.getElementById("newsContainer");
      container.innerHTML = "";

      if (news.length === 0) {
        container.innerHTML = "<p>No news found 😕</p>";
        return;
      }

      news.forEach(item => {
        const div = document.createElement("div");
        div.className = "news-item";

        div.innerHTML = `
          <h3>${item.title || "No Title"}</h3>
          <p>Author: ${item.author}</p>
          <a href="${item.url}" target="_blank">Read More →</a>
        `;

        container.appendChild(div);
      });
    }

    function searchNews() {
      const query = document.getElementById("searchInput").value;
      if (query.trim() !== "") {
        fetchNews(query);
      }
    }
  </script>

</body>
</html>
